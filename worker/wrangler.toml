name = "nipun-ai-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Environment variables — swap these placeholder values with your real keys if you want
# server-side defaults. Otherwise, keys are sent per-request via BYOK.
[vars]
ENVIRONMENT = "production"
# Set to "true" in your Cloudflare dashboard to force demo-only mode.
# Self-hosters: leave as "false" for full BYOK functionality.
DEMO_ONLY = "false"

# CORS: allowed origins (comma-separated). Self-hosters: update this with your
# deployed frontend URL. For local development, localhost:5173 is already included.
# If deploying to Cloudflare Pages, the worker handles *.pages.dev preview URLs dynamically.
ALLOWED_ORIGINS = "http://localhost:5173"
